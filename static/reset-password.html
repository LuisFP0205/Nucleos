<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nucleus · Redefinir Senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/static/supabase.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #060912;
  --card:   #0e1120;
  --card2:  #141828;
  --border: rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:   #dde3f0;
  --muted:  #4b5478;
  --dim:    #252b42;
  --cyan:   #00c8e0;
  --cyan2:  #00a8be;
  --red:    #ef4444;
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  bottom: -120px; left: -80px;
  width: 500px; height: 400px;
  background: radial-gradient(ellipse, rgba(0,200,224,0.07) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  top: -80px; right: -60px;
  width: 360px; height: 300px;
  background: radial-gradient(ellipse, rgba(145,71,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  position: relative;
  z-index: 1;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 0 0 1px rgba(0,200,224,0.06), 0 32px 80px rgba(0,0,0,0.6);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.5;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo-icon { width: 36px; height: 36px; object-fit: contain; }
.logo-name {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h1 { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }

.field { margin-bottom: 14px; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
input[type=password] {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--cyan); }
input::placeholder { color: var(--muted); }

/* Requisitos de senha */
.req-list {
  list-style: none;
  margin: 8px 0 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.req-list li {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.req-list li.ok { color: var(--cyan); }
.req-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background 0.2s;
}
.req-list li.ok .req-dot { background: var(--cyan); }

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--cyan), var(--cyan2));
  color: #060912;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 8px;
  padding: 11px;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.msg {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
.msg.info  { background: rgba(0,200,224,0.08); border: 1px solid rgba(0,200,224,0.2); color: var(--cyan); }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(6,9,18,0.3); border-top-color: #060912;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img class="logo-icon" src="/icones/Logo.png" alt="Nucleus" onerror="this.style.display='none'">
    <span class="logo-name">Nucleus</span>
  </div>

  <h1>Redefinir senha</h1>
  <p class="subtitle">Escolha uma nova senha para sua conta</p>

  <div class="field">
    <label for="inp-pass">Nova senha</label>
    <input type="password" id="inp-pass" placeholder="••••••••" oninput="checkReqs()">
  </div>

  <!-- Requisitos visuais -->
  <ul class="req-list">
    <li id="req-len">  <span class="req-dot"></span> Mínimo 8 caracteres</li>
    <li id="req-upper"><span class="req-dot"></span> Uma letra maiúscula</li>
    <li id="req-spec"> <span class="req-dot"></span> Um caractere especial</li>
  </ul>

  <div class="field">
    <label for="inp-confirm">Confirmar nova senha</label>
    <input type="password" id="inp-confirm" placeholder="••••••••">
  </div>

  <button class="btn-primary" id="btn-save" onclick="doReset()">Salvar nova senha</button>
  <div class="msg" id="msg"></div>
</div>

<script>
let _sb = null;

async function initSupabase() {
  if (_sb) return _sb;
  const res = await fetch('/auth/supabase/config');
  const cfg = await res.json();
  if (!cfg.enabled) { showMsg('Supabase não configurado.'); return null; }
  _sb = supabase.createClient(cfg.url, cfg.anon_key);
  return _sb;
}

// Supabase detecta o token de recuperação no hash da URL automaticamente
(async () => {
  const sb = await initSupabase();
  if (!sb) return;
  // Garante que a sessão de recuperação seja estabelecida
  await sb.auth.getSession();
})();

function checkReqs() {
  const pass = document.getElementById('inp-pass').value;
  toggle('req-len',   pass.length >= 8);
  toggle('req-upper', /[A-Z]/.test(pass));
  toggle('req-spec',  /[^A-Za-z0-9]/.test(pass));
}

function toggle(id, ok) {
  document.getElementById(id).classList.toggle('ok', ok);
}

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function doReset() {
  const pass    = document.getElementById('inp-pass').value;
  const confirm = document.getElementById('inp-confirm').value;

  if (pass.length < 8)             { showMsg('A senha deve ter no mínimo 8 caracteres.');         return; }
  if (!/[A-Z]/.test(pass))         { showMsg('A senha deve conter pelo menos uma letra maiúscula.'); return; }
  if (!/[^A-Za-z0-9]/.test(pass))  { showMsg('A senha deve conter pelo menos um caractere especial.'); return; }
  if (pass !== confirm)            { showMsg('As senhas não coincidem.');                          return; }

  const sb = await initSupabase();
  if (!sb) return;

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';

  const { error } = await sb.auth.updateUser({ password: pass });
  btn.disabled = false;
  btn.textContent = 'Salvar nova senha';

  if (error) {
    showMsg(error.message);
    return;
  }

  showMsg('Senha redefinida com sucesso! Redirecionando...', 'info');
  setTimeout(() => location.replace('/'), 2500);
}

document.getElementById('inp-confirm').addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});
</script>
</body>
</html>
