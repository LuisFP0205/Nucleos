<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nucleus · Logs</title>
<!-- Tema -->
<script src="/static/theme.js"></script>
<!-- Auth guard -->
<style id="_ah">body{visibility:hidden!important}</style>
<script src="/static/supabase.js"></script>
<script src="/static/nucleus-auth.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0a0a0a;
    --surface: #111111;
    --border:  #1e1e1e;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --green:   #22c55e;
    --yellow:  #eab308;
    --red:     #ef4444;
    --cyan:    #06b6d4;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Consolas', 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .header-dot.disconnected {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }

  .header-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    flex: 1;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .04em;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn:hover { color: var(--text); border-color: #444; }

  /* ── Terminal ───────────────────────────────────────────────── */
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .line {
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Colorização por nível */
  .line.INFO    { color: var(--text); }
  .line.WARNING { color: var(--yellow); }
  .line.ERROR   { color: var(--red); }
  .line.CRITICAL{ color: var(--red); font-weight: bold; }
  .line.DEBUG   { color: var(--muted); }

  /* Destaque de palavras-chave */
  .kw-startup  { color: var(--cyan); }
  .kw-shutdown { color: var(--yellow); }
  .kw-live     { color: var(--green); }
  .kw-error    { color: var(--red); }

  /* ── Status bar ─────────────────────────────────────────────── */
  footer {
    padding: 5px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* ── Modo claro ───────────────────────────────────────────────── */
  html[data-theme="light"] {
    --bg:      #e8ecf6;
    --surface: #f5f7fd;
    --border:  #d0d8ee;
    --text:    #0d1229;
    --muted:   #5e6d96;
  }
  html[data-theme="light"] body { background: var(--bg); color: var(--text); }
  html[data-theme="light"] header { background: var(--surface); }
  html[data-theme="light"] #log-container { background: var(--surface); }
  html[data-theme="light"] .log-line { color: #2a3150; }
  html[data-theme="light"] .log-line.warn  { color: #92400e; }
  html[data-theme="light"] .log-line.error { color: #991b1b; }
  html[data-theme="light"] .log-line.info  { color: #1e40af; }
</style>
</head>
<body>

<header>
  <div class="header-dot" id="status-dot"></div>
  <span class="header-title">Nucleus · Server Logs</span>
  <div class="header-actions">
    <button class="btn" onclick="clearLogs()">Limpar</button>
    <button class="btn" id="btn-scroll" onclick="toggleAutoScroll()">Auto-scroll ON</button>
  </div>
</header>

<div id="terminal"></div>

<footer>
  <span id="footer-status">Conectando...</span>
  <span id="footer-count">0 linhas</span>
</footer>

<script>
  NucleusAuth.guard();
  const terminal   = document.getElementById('terminal');
  const dot        = document.getElementById('status-dot');
  const footerSt   = document.getElementById('footer-status');
  const footerCnt  = document.getElementById('footer-count');
  const btnScroll  = document.getElementById('btn-scroll');

  let lineCount  = 0;
  let autoScroll = true;

  function toggleAutoScroll() {
    autoScroll = !autoScroll;
    btnScroll.textContent = autoScroll ? 'Auto-scroll ON' : 'Auto-scroll OFF';
  }

  function clearLogs() {
    terminal.innerHTML = '';
    lineCount = 0;
    footerCnt.textContent = '0 linhas';
  }

  function levelOf(text) {
    if (/\[ERROR\]|\[CRITICAL\]/.test(text))   return 'ERROR';
    if (/\[WARNING\]/.test(text))               return 'WARNING';
    if (/\[DEBUG\]/.test(text))                 return 'DEBUG';
    return 'INFO';
  }

  function highlight(text) {
    return text
      .replace(/\[Startup\]/g,  '<span class="kw-startup">[Startup]</span>')
      .replace(/\[Shutdown\]/g, '<span class="kw-shutdown">[Shutdown]</span>')
      .replace(/ao vivo|is live|LIVE/gi, '<span class="kw-live">$&</span>')
      .replace(/error|erro|falha/gi,     '<span class="kw-error">$&</span>');
  }

  function appendLine(text) {
    const div = document.createElement('div');
    div.className = 'line ' + levelOf(text);
    div.innerHTML = highlight(
      text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    );
    terminal.appendChild(div);
    lineCount++;
    footerCnt.textContent = lineCount + ' linha' + (lineCount !== 1 ? 's' : '');
    if (autoScroll) terminal.scrollTop = terminal.scrollHeight;
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws/logs`);

    ws.onopen = () => {
      dot.className = 'header-dot';
      footerSt.textContent = 'Conectado — ' + new Date().toLocaleTimeString();
    };

    ws.onmessage = (e) => appendLine(e.data);

    ws.onclose = () => {
      dot.className = 'header-dot disconnected';
      footerSt.textContent = 'Desconectado — reconectando...';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
