<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Music Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Bungee&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', Arial, sans-serif;
    width: 340px;
  }

  #music-widget {
    background: rgba(0, 0, 0, 0.70);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.4s;
  }

  #music-widget.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #thumb {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: #333;
  }

  #thumb.default {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .info {
    flex: 1;
    overflow: hidden;
  }

  #title {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #artist {
    color: #aaa;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }


  #nucleus-badge {
    display: none;
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: 9px;
    color: rgba(255,255,255,0.28);
    font-family: 'Segoe UI', Arial, sans-serif;
    letter-spacing: 0.04em;
    pointer-events: none;
    user-select: none;
  }

  /* ══════════════════════════════════════════════════════════════
     TEMA: TWITCH
  ══════════════════════════════════════════════════════════════ */
  body.theme-twitch #music-widget {
    background: rgba(18, 8, 36, 0.90);
    border-radius: 16px;
    border: 1px solid rgba(145,71,255,0.3);
    box-shadow: 0 0 20px rgba(145,71,255,0.15);
  }
  body.theme-twitch #thumb   { border-radius: 50%; border: 2px solid rgba(145,71,255,0.5); }
  body.theme-twitch #title   { color: #e9d5ff; }
  body.theme-twitch #artist  { color: #a78bfa; }

  /* ══════════════════════════════════════════════════════════════
     TEMA: NEON
  ══════════════════════════════════════════════════════════════ */
  body.theme-neon #music-widget {
    background: rgba(0, 0, 0, 0.90);
    border-radius: 10px;
    border: 1px solid rgba(0,200,224,0.5);
    box-shadow: 0 0 16px rgba(0,200,224,0.2), inset 0 0 20px rgba(0,0,0,0.5);
  }
  body.theme-neon #thumb  { border-radius: 6px; box-shadow: 0 0 12px rgba(0,200,224,0.4); }
  body.theme-neon #title  { color: #00e5ff; text-shadow: 0 0 10px rgba(0,200,224,0.7); }
  body.theme-neon #artist { color: #a78bfa; text-shadow: 0 0 8px rgba(167,139,250,0.5); }

  /* ══════════════════════════════════════════════════════════════
     TEMA: LIGHT
  ══════════════════════════════════════════════════════════════ */
  body.theme-light #music-widget {
    background: rgba(255, 255, 255, 0.88);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.08);
  }
  body.theme-light #thumb  { border-radius: 8px; }
  body.theme-light #title  { color: #1a1a2e; }
  body.theme-light #artist { color: #555; }

  /* ══════════════════════════════════════════════════════════════
     TEMA: BOXSIDE — sem caixa, só borda lateral
  ══════════════════════════════════════════════════════════════ */
  body.theme-boxside #music-widget {
    background: transparent;
    border-radius: 0;
    border: none;
    border-left: 3px solid #00c8e0;
    padding: 8px 12px;
    gap: 10px;
  }
  body.theme-boxside #thumb  { width: 44px; height: 44px; border-radius: 6px; }
  body.theme-boxside #title  { color: #fff; font-size: 13px; }
  body.theme-boxside #artist { color: rgba(255,255,255,0.6); font-size: 11px; }

  /* ══════════════════════════════════════════════════════════════
     TEMA: RETRO — terminal CRT fósforo verde
  ══════════════════════════════════════════════════════════════ */
  body.theme-retro::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px,
      transparent 1px, transparent 3px
    );
  }
  body.theme-retro #music-widget {
    background: rgba(0, 12, 0, 0.90);
    border-radius: 0;
    border: 1px solid #00ff41;
    box-shadow: 0 0 10px rgba(0,255,65,0.2), inset 0 0 16px rgba(0,255,65,0.05);
  }
  body.theme-retro #thumb  { border-radius: 0; border: 1px solid #00ff41; filter: grayscale(0.4) sepia(0.3) hue-rotate(90deg); }
  body.theme-retro #title  { color: #00ff41; font-family: 'VT323', monospace; font-size: 20px; text-shadow: 0 0 8px rgba(0,255,65,0.7); }
  body.theme-retro #artist { color: #4dff80; font-family: 'VT323', monospace; font-size: 16px; text-shadow: 0 0 5px rgba(0,255,65,0.4); }
  body.theme-retro #progress-bar { background: rgba(0,255,65,0.15); }
  body.theme-retro #progress-fill { background: #00ff41; box-shadow: 0 0 6px #00ff41; }

  /* ══════════════════════════════════════════════════════════════
     TEMA: RADIO 80s — synthwave, magenta + laranja
  ══════════════════════════════════════════════════════════════ */
  body.theme-retro80 #music-widget {
    background: rgba(15, 0, 22, 0.92);
    border-radius: 4px;
    border: 1px solid #ff1a8c;
    box-shadow: 0 0 18px rgba(255,26,140,0.25), inset 0 0 22px rgba(255,26,140,0.05);
  }
  body.theme-retro80 #thumb {
    border-radius: 4px;
    border: 1px solid rgba(255,26,140,0.5);
    filter: saturate(1.2) contrast(1.05);
  }
  body.theme-retro80 #title {
    font-family: 'Bungee', sans-serif;
    font-size: 14px;
    background: linear-gradient(90deg, #ff1a8c, #ff8c00);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  body.theme-retro80 #artist { color: #ff8cc8; font-size: 12px; }
  body.theme-retro80 #progress-bar  { background: rgba(255,26,140,0.15); }
  body.theme-retro80 #progress-fill {
    background: linear-gradient(90deg, #ff1a8c, #ff8c00);
    box-shadow: 0 0 6px rgba(255,26,140,0.6);
  }

</style>
</head>
<body>

<div id="music-widget" class="hidden" style="position:relative">
  <img id="thumb" src="" alt="Album art">
  <div class="info">
    <div id="title">—</div>
    <div id="artist">—</div>
  </div>
  <span id="nucleus-badge">Powered by Nucleus</span>
</div>

<script>
  const POLL_INTERVAL = 5000; // ms

  const widget   = document.getElementById('music-widget');
  const thumb    = document.getElementById('thumb');
  const titleEl  = document.getElementById('title');
  const artistEl = document.getElementById('artist');

  let currentTitle = '';

  async function poll() {
    try {
      const resp = await fetch('/music/current');
      if (!resp.ok) return;
      const data = await resp.json();

      if (!data.is_playing || !data.title) {
        widget.classList.add('hidden');
        currentTitle = '';
        return;
      }

      widget.classList.remove('hidden');

      if (data.title !== currentTitle) {
        titleEl.textContent  = data.title  || '—';
        artistEl.textContent = data.artist || '—';
        currentTitle = data.title;

        if (data.thumbnail) {
          thumb.src = data.thumbnail;
          thumb.style.display = 'block';
        } else {
          thumb.src = '';
          thumb.style.display = 'none';
        }
      }

    } catch (e) {
      console.error('[Music Overlay] Fetch error', e);
    }
  }

  poll();
  setInterval(poll, POLL_INTERVAL);

  // Badge "Powered by Nucleus" — visível apenas para FREE
  fetch('/auth/plan').then(r => r.json()).then(d => {
    if (!d.is_premium) document.getElementById('nucleus-badge').style.display = 'block';
  }).catch(() => { document.getElementById('nucleus-badge').style.display = 'block'; });

  // Carrega tema do overlay e escuta mudanças em tempo real
  function _applyOverlayTheme(theme) {
    document.body.className = document.body.className.replace(/\btheme-\S+/g, '').trim();
    if (theme && theme !== 'minimal') document.body.classList.add('theme-' + theme);
  }

  (async () => {
    try {
      const d = await fetch('/overlay/themes').then(r => r.json());
      _applyOverlayTheme(d.music || 'minimal');
    } catch {}
  })();

  // Custom styles
  function _applyCustomCss(css) {
    let el = document.getElementById('ov-custom-style');
    if (!el) { el = document.createElement('style'); el.id = 'ov-custom-style'; document.head.appendChild(el); }
    el.textContent = css || '';
  }
  (async () => {
    try {
      const d = await fetch('/overlay/custom-styles/music').then(r => r.json());
      _applyCustomCss(d.css || '');
    } catch {}
  })();

  (function _connectOverlayEvents() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/overlay-events`);
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'theme_changed') _applyOverlayTheme(msg.themes.music || 'minimal');
        if (msg.type === 'styles_changed' && msg.key === 'music') _applyCustomCss(msg.css || '');
      } catch {}
    };
    ws.onclose = () => setTimeout(_connectOverlayEvents, 3000);
  })();
</script>
</body>
</html>
